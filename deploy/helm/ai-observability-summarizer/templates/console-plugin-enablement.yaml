{{- if .Values.consolePlugins.enableTracing }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-enable-tracing-plugin
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "10"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: console-plugin-enablement
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: Never
      serviceAccountName: {{ .Release.Name }}-console-patcher
      containers:
        - name: enable-tracing-plugin
          image: {{ .Values.consolePlugins.patcherImage }}
          command:
            - /bin/bash
            - -c
            - |
              set -e
              PLUGIN="distributed-tracing-console-plugin"
              if oc get console.operator.openshift.io cluster -o jsonpath='{.spec.plugins}' 2>/dev/null | grep -q "$PLUGIN"; then
                echo "Console plugin $PLUGIN already enabled"
              else
                echo "Enabling console plugin $PLUGIN..."
                oc patch console.operator.openshift.io cluster --type=json \
                  -p="[{\"op\": \"add\", \"path\": \"/spec/plugins/-\", \"value\": \"$PLUGIN\"}]"
                echo "Console plugin $PLUGIN enabled"
              fi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 10m
              memory: 50Mi
{{- end }}
