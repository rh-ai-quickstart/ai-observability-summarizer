apiVersion: v2
name: ai-observability-summarizer
description: >-
  Umbrella Helm chart for deploying the full AI Observability Summarizer stack.
  Operators (Cluster Observability, OpenTelemetry, Tempo, Logging, Loki) are
  expected to be pre-installed by the platform team.
type: application
version: 1.0.0
appVersion: "1.0.8"
keywords:
  - ai
  - observability
  - openshift
  - vllm
  - mcp
  - tracing
  - logging
  - metrics
  - korrel8r
maintainers:
  - name: OpenShift AI Observability Team
annotations:
  category: Observability
  openshift.io/display-name: "AI Observability Summarizer"

dependencies:
  # ---- Observability Platform ----

  - name: minio-observability-storage
    version: 0.1.0
    repository: file://../minio
    condition: minio.enabled
    alias: minio

  - name: tempo-stack
    version: 1.0.0
    repository: file://../observability/tempo
    condition: tempo.enabled
    alias: tempo

  - name: otel-collector
    version: 0.2.0
    repository: file://../observability/otel-collector
    condition: otelCollector.enabled
    alias: otelCollector

  - name: loki-stack
    version: 0.1.0
    repository: file://../observability/loki
    condition: loki.enabled
    alias: loki

  - name: korrel8r
    version: 0.1.0
    repository: file://../observability/korrel8r
    condition: korrel8r.enabled

  # ---- Application Components ----

  - name: mcp-server
    version: 0.1.0
    repository: file://../mcp-server
    condition: mcpServer.enabled
    alias: mcpServer

  - name: ui
    version: 0.1.0
    repository: file://../ui
    condition: metricUi.enabled
    alias: metricUi

  - name: openshift-console-plugin
    version: 0.1.0
    repository: file://../openshift-console-plugin
    condition: consolePlugin.enabled
    alias: consolePlugin

  - name: openshift-aiobs-react-ui
    version: 1.0.0
    repository: file://../react-ui-app
    condition: reactUi.enabled
    alias: reactUi

  - name: alerts
    version: 0.1.0
    repository: file://../alerting
    condition: alerting.enabled

  - name: rag
    version: 0.1.0
    repository: file://../rag
    condition: rag.enabled
