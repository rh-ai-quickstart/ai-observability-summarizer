# Job to patch Tempo operator Subscription to use Manual approval
# This ensures Tempo upgrades require manual approval to avoid buggy versions
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-tempo-sub-patcher
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: tempo-subscription-patcher
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: operator-config
    app.kubernetes.io/part-of: aiobs-stack
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"  # Run after operators are installed
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 5
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tempo-subscription-patcher
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ .Release.Name }}-tempo-sub-patcher
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: patcher
        image: registry.redhat.io/openshift4/ose-cli:latest
        command:
        - /bin/bash
        - -c
        - |
          set -e

          echo "🔍 Waiting for Tempo operator Subscription to be created by OLM..."
          echo "→ Searching in namespace: {{ .Release.Namespace }}"

          # Wait up to 2 minutes for the Subscription to exist in current namespace
          SUB_NAME=""
          for i in {1..24}; do
            # Find subscription with spec.name==tempo-product in current namespace
            # Use grep to filter subscriptions by spec.name
            SUB_NAME=$(oc get subscription -n {{ .Release.Namespace }} -o jsonpath='{range .items[*]}{.metadata.name}{":"}{.spec.name}{"\n"}{end}' 2>/dev/null | grep ":tempo-product$" | cut -d: -f1 | head -1)

            if [ -n "$SUB_NAME" ]; then
              echo "✅ Found Tempo Subscription: $SUB_NAME"
              break
            fi
            echo "⏳ Waiting for Subscription... ($i/24)"
            sleep 5
          done

          SUB_NAMESPACE="{{ .Release.Namespace }}"

          if [ -z "$SUB_NAMESPACE" ] || [ -z "$SUB_NAME" ]; then
            echo "❌ Could not find Tempo operator Subscription"
            exit 1
          fi

          echo "→ Found Subscription: $SUB_NAME in namespace: $SUB_NAMESPACE"

          # Check current installPlanApproval setting
          CURRENT_APPROVAL=$(oc get subscription "$SUB_NAME" -n "$SUB_NAMESPACE" -o jsonpath='{.spec.installPlanApproval}')
          echo "→ Current installPlanApproval: $CURRENT_APPROVAL"

          if [ "$CURRENT_APPROVAL" = "Manual" ]; then
            echo "✅ Tempo Subscription already set to Manual approval - skipping"
            exit 0
          fi

          echo "→ Patching Subscription to use Manual approval..."

          oc patch subscription "$SUB_NAME" -n "$SUB_NAMESPACE" --type=merge -p '{"spec":{"installPlanApproval":"Manual"}}'

          echo "✅ Tempo operator Subscription set to Manual approval"
          echo "  → Namespace: $SUB_NAMESPACE"
          echo "  → Subscription: $SUB_NAME"
          echo "  → installPlanApproval: Manual"
          echo ""
          echo "⚠️  NOTE: Tempo operator upgrades now require manual approval"
          echo "   To approve an upgrade: oc patch installplan <name> -n $SUB_NAMESPACE --type=merge -p '{\"spec\":{\"approved\":true}}'"
        securityContext:
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
          seccompProfile:
            type: RuntimeDefault
---
# ServiceAccount for the patcher job
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-tempo-sub-patcher
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: tempo-subscription-patcher
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
---
# ClusterRole to manage Subscriptions
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-tempo-sub-patcher
  labels:
    app.kubernetes.io/name: tempo-subscription-patcher
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
rules:
- apiGroups: ["operators.coreos.com"]
  resources: ["subscriptions"]
  verbs: ["get", "list", "patch", "update"]
---
# ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-tempo-sub-patcher
  labels:
    app.kubernetes.io/name: tempo-subscription-patcher
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-tempo-sub-patcher
subjects:
- kind: ServiceAccount
  name: {{ .Release.Name }}-tempo-sub-patcher
  namespace: {{ .Release.Namespace }}
