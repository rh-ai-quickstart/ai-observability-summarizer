apiVersion: v2
name: rag
description: A Helm chart for Kubernetes
type: application
version: 0.1.0
appVersion: "1.16.0"

dependencies:
  - name: llm-service
    version: 0.5.4
    repository: https://rh-ai-quickstart.github.io/ai-architecture-charts
  - name: llama-stack
    version: 0.5.3
    # Using enhanced chart with operator mode support (useByOperator, network.allowedFrom.labels)
    # Temporarily using local copy from git branch until operator support is released
    # See 'make depend' target for how this is fetched
    repository: "file://.llama-stack-operator-chart"
    condition: llama-stack.enabled
  - name: llama-stack-instance
    version: 1.0.0
    repository: "file://llama-stack-instance"
    condition: llama-stack-instance.enabled
  - name: pgvector
    version: 0.5.0
    repository: https://rh-ai-quickstart.github.io/ai-architecture-charts
