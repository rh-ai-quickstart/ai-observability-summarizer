# This chart deploys backend services (llm-service, llama-stack, pgvector)
# Two LlamaStack deployment modes:
#   Default (Helm chart):  llama-stack.enabled=true   -> deploys raw LlamaStack Deployment (service: llamastack)
#   Operator mode:         llama-stack-instance.enabled=true -> creates LlamaStackDistribution CR (service: llamastack-service)
# To switch to operator mode, set RHOAI_VERSION=3 USE_LLAMA_STACK_OPERATOR=true when running make install

# Common model values for llm-service and llama-stack / llama-stack-instance
# See format in https://github.com/RHEcosystemAppEng/ai-architecture-charts/blob/main/helm/llm-service/values.yaml
# For e.g., to add a new model add the following block and it will append to the list of models defined in the llm-service

global:
  models:
    llama-3-1-8b-instruct:
      id: meta-llama/Llama-3.1-8B-Instruct
      enabled: true
      # The llm-service and llama-stack charts will auto-generate the URL
      # based on the service name: http://llama-3-1-8b-instruct.<namespace>.svc.cluster.local/v1


pgvector:
  secret:
    user: postgres
    password: rag_password
    dbname: rag_blueprint
    host: pgvector
    port: "5432"

minio:
  secret:
    user: minio_rag_user
    password: minio_rag_password
    host: minio
    port: "9000"
  
    # Upload sample files to the minio bucket 
  sampleFileUpload:
    enabled: true
    bucket: documents
    urls: 
    - https://raw.githubusercontent.com/rh-ai-quickstart/RAG/refs/heads/main/notebooks/Zippity_Zoo_Grand_Invention.pdf
    - https://raw.githubusercontent.com/rh-ai-quickstart/RAG/refs/heads/main/notebooks/Zippity_Zoo_and_the_Town_of_Tumble_Town.pdf
    - https://raw.githubusercontent.com/rh-ai-quickstart/RAG/refs/heads/main/notebooks/Zippity_Zoo_and_the_Town_of_Whispering_Willows.pdf


llm-service:
  # Explicitly enable llm-service chart to deploy vLLM pods
  # Models are inherited from global.models
  enabled: true

llama-stack:
  enabled: true
  # Models configuration - explicitly define for the remote chart
  models:
    meta-llama:
      id: Llama-3.1-8B-Instruct
      enabled: true
      url: http://llama-3-1-8b-instruct-predictor.jianrong.svc.cluster.local:8080/v1
      apiToken: fake
  env:
    - name: RUN_CONFIG_PATH
      value: /app-config/config.yaml
    - name: VLLM_MAX_TOKENS
      value: "4096"
    - name: VLLM_API_TOKEN
      value: fake
    # Disable OTEL export until observability-hub namespace has OTEL collector deployed
    # - name: OTEL_ENDPOINT
    #   value: http://otel-collector-collector.observability-hub.svc.cluster.local:4318/v1/traces
    - name: OTEL_SDK_DISABLED
      value: "true"
    - name: OTEL_PYTHON_DISABLED_INSTRUMENTATIONS
      value: sqlite3
    - name: POSTGRES_USER
      valueFrom:
        secretKeyRef:
          key: user
          name: pgvector
    - name: POSTGRES_PASSWORD
      valueFrom:
        secretKeyRef:
          key: password
          name: pgvector
    - name: POSTGRES_HOST
      valueFrom:
        secretKeyRef:
          key: host
          name: pgvector
    - name: POSTGRES_PORT
      valueFrom:
        secretKeyRef:
          key: port
          name: pgvector
    - name: POSTGRES_DBNAME
      valueFrom:
        secretKeyRef:
          key: dbname
          name: pgvector
  secrets:
    TAVILY_SEARCH_API_KEY: "Paste-your-key-here"
  # For llama-stack-instance, {{ .Release.Namespace }} is expanded via tpl in the subchart ConfigMap.
  # For llama-stack (architecture chart), behavior depends on that upstream chart.
  mcp-servers:
    observability-mcp:
      uri: http://aiobs-mcp-server-svc.{{ .Release.Namespace }}.svc.cluster.local:8085/mcp
    #  mcp-weather:
    #   uri: http://rag-mcp-weather:8000/sse


llama-stack-instance:
  enabled: false
  # Explicitly disable all built-in models - models should come from global.models or llm-service chart
  models:
    llama-3-2-3b-instruct:
      enabled: false
    llama-guard-3-8b:
      enabled: false
    llama-3-2-1b-instruct:
      enabled: false
    llama-3-1-8b-instruct:
      enabled: false
    llama-guard-3-1b:
      enabled: false
    llama-3-3-70b-instruct:
      enabled: false
    llama-3-2-1b-instruct-quantized:
      enabled: false
  env:
    - name: VLLM_MAX_TOKENS
      value: "4096"
    - name: VLLM_API_TOKEN
      value: fake
    # Disable OTEL export until observability-hub namespace has OTEL collector deployed
    # - name: OTEL_ENDPOINT
    #   value: http://otel-collector-collector.observability-hub.svc.cluster.local:4318/v1/traces
    - name: OTEL_SDK_DISABLED
      value: "true"
    - name: OTEL_PYTHON_DISABLED_INSTRUMENTATIONS
      value: sqlite3
    - name: POSTGRES_USER
      valueFrom:
        secretKeyRef:
          key: user
          name: pgvector
    - name: POSTGRES_PASSWORD
      valueFrom:
        secretKeyRef:
          key: password
          name: pgvector
    - name: POSTGRES_HOST
      valueFrom:
        secretKeyRef:
          key: host
          name: pgvector
    - name: POSTGRES_PORT
      valueFrom:
        secretKeyRef:
          key: port
          name: pgvector
    - name: POSTGRES_DBNAME
      valueFrom:
        secretKeyRef:
          key: dbname
          name: pgvector
  secrets:
    TAVILY_SEARCH_API_KEY: "Paste-your-key-here"
  # Namespace in uri is expanded via tpl in llama-stack-instance/templates/configmap.yaml.
  mcp-servers:
    observability-mcp:
      uri: http://aiobs-mcp-server-svc.{{ .Release.Namespace }}.svc.cluster.local:8085/mcp
    #  mcp-weather:
    #   uri: http://rag-mcp-weather:8000/sse


ingestion-pipeline:
  # options are [S3, URL]
  source: S3
  # embedding model to use for creating embeddings
  embedding_model: all-MiniLM-L6-v2
  # name of the vector db with version, pipeline will be created with pipeline_red_hat_openshift
  name: "zippity-zoo-vector-db"
  # version of the knowledgebase
  version: "1.0"

  S3:
    access_key_id: minio_rag_user
    secret_access_key: minio_rag_password
    bucket_name: documents
    endpoint_url: http://minio:9000
    region: us-east-1
