# This chart deploys backend services (llm-service, llama-stack, pgvector)
# Two LlamaStack deployment modes:
#   Default (Helm chart):  llama-stack.managedByOperator=false -> deploys raw LlamaStack Deployment (service: llamastack)
#   Operator mode:         llama-stack.managedByOperator=true  -> creates LlamaStackDistribution CR (service: llamastack-service)
# To switch to operator mode, set RHOAI_VERSION=3 USE_LLAMA_STACK_OPERATOR=true when running make install

# Common model values for llm-service and llama-stack
# See format in https://github.com/RHEcosystemAppEng/ai-architecture-charts/blob/main/helm/llm-service/values.yaml
# For e.g., to add a new model add the following block and it will append to the list of models defined in the llm-service

global:
  models: {}


pgvector:
  secret:
    user: postgres
    password: rag_password
    dbname: rag_blueprint
    host: pgvector
    port: "5432"

minio:
  secret:
    user: minio_rag_user
    password: minio_rag_password
    host: minio
    port: "9000"
  
    # Upload sample files to the minio bucket 
  sampleFileUpload:
    enabled: true
    bucket: documents
    urls: 
    - https://raw.githubusercontent.com/rh-ai-quickstart/RAG/refs/heads/main/notebooks/Zippity_Zoo_Grand_Invention.pdf
    - https://raw.githubusercontent.com/rh-ai-quickstart/RAG/refs/heads/main/notebooks/Zippity_Zoo_and_the_Town_of_Tumble_Town.pdf
    - https://raw.githubusercontent.com/rh-ai-quickstart/RAG/refs/heads/main/notebooks/Zippity_Zoo_and_the_Town_of_Whispering_Willows.pdf


llama-stack:
  enabled: true
  # managedByOperator: when true, deploys via LlamaStackDistribution CRD (requires RHOAI 3.x)
  # Set via Makefile: USE_LLAMA_STACK_OPERATOR=true
  managedByOperator: false
  env:
    - name: RUN_CONFIG_PATH
      value: /app-config/config.yaml
    - name: VLLM_MAX_TOKENS
      value: "4096"
    - name: VLLM_API_TOKEN
      value: fake
    - name: OTEL_ENDPOINT
      value: http://otel-collector-collector.observability-hub.svc.cluster.local:4318/v1/traces
    - name: OTEL_PYTHON_DISABLED_INSTRUMENTATIONS
      value: sqlite3
  # POSTGRES_* env vars are automatically added by the llama-stack chart when pgvector.enabled=true (default)
  secrets:
    TAVILY_SEARCH_API_KEY: "Paste-your-key-here"
  # {{ .Release.Namespace }} template is expanded by the llama-stack chart
  mcp-servers:
    observability-mcp:
      uri: http://aiobs-mcp-server-svc.{{ .Release.Namespace }}.svc.cluster.local:8085/mcp
    #  mcp-weather:
    #   uri: http://rag-mcp-weather:8000/sse

  # Operator mode configuration
  # These values are only used when managedByOperator: true
  userConfig: {}
  network:
    exposeRoute: false


ingestion-pipeline:
  # options are [S3, URL]
  source: S3
  # embedding model to use for creating embeddings
  embedding_model: all-MiniLM-L6-v2
  # name of the vector db with version, pipeline will be created with pipeline_red_hat_openshift
  name: "zippity-zoo-vector-db"
  # version of the knowledgebase
  version: "1.0"

  S3:
    access_key_id: minio_rag_user
    secret_access_key: minio_rag_password
    bucket_name: documents
    endpoint_url: http://minio:9000
    region: us-east-1
