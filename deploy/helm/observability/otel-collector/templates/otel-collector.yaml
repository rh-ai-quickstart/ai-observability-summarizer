{{- if .Values.collector.enabled -}}
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: {{ .Values.collector.name }}
  namespace: {{ include "otel-collector.namespace" . }}
  labels:
    {{- include "otel-collector.collectorLabels" . | nindent 4 }}
  {{- with .Values.common.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  serviceAccount: {{ include "otel-collector.serviceAccountName" . }}
  mode: {{ .Values.collector.mode }}
  upgradeStrategy: {{ .Values.collector.upgradeStrategy }}
  managementState: {{ .Values.collector.managementState }}
  {{- if eq .Values.collector.mode "deployment" }}
  replicas: {{ .Values.collector.replicas }}
  {{- end }}
  {{- $dt := .Values.metricsBridge.dynatrace }}
  {{- $wantDt := and $dt.otlpHttpEndpoint $dt.apiTokenSecretName (or .Values.metricsBridge.enabled .Values.metricsBridge.forwardOtelTraces .Values.metricsBridge.forwardOtelMetrics) }}
  {{- if $wantDt }}
  env:
    - name: DT_API_TOKEN
      valueFrom:
        secretKeyRef:
          name: {{ $dt.apiTokenSecretName | quote }}
          key: {{ $dt.apiTokenSecretKey | quote }}
  {{- end }}
  ipFamilyPolicy: {{ .Values.collector.ipFamilyPolicy }}
  {{- with .Values.collector.resources }}
  resources:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  observability:
    {{- with .Values.collector.observability }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- if .Values.collector.ingress.enabled }}
  ingress:
    type: {{ .Values.collector.ingress.type }}
    {{- if eq .Values.collector.ingress.type "route" }}
    route:
      {{- with .Values.collector.ingress.route }}
      {{- toYaml . | nindent 6 }}
      {{- end }}
    {{- end }}
    {{- with .Values.collector.ingress.annotations }}
    annotations:
      {{- toYaml . | nindent 6 }}
    {{- end }}
  {{- end }}
  config:
    extensions:
      {{- with .Values.collector.config.extensions }}
      {{- toYaml . | nindent 6 }}
      {{- end }}

    exporters:
      debug:
        {{- with .Values.collector.config.exporters.debug }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      otlphttp/dev:
        endpoint: {{ include "otel-collector.tempoGatewayEndpoint" . }}
        headers:
          X-Scope-OrgID: {{ .Values.tempo.auth.orgID }}
        tls:
          insecure: false
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/service-ca.crt
        {{- if .Values.tempo.auth.useServiceAccountToken }}
        auth:
          authenticator: bearertokenauth
        {{- end }}
      {{- if $wantDt }}
      otlphttp/dynatrace:
        endpoint: {{ $dt.otlpHttpEndpoint | quote }}
        tls:
          insecure: false
        headers:
          Authorization: "Api-Token ${env:DT_API_TOKEN}"
      {{- end }}

    receivers:
      otlp:
        {{- with .Values.collector.config.receivers.otlp }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- if and $wantDt .Values.metricsBridge.enabled (gt (len .Values.metricsBridge.prometheus.scrapeConfigs) 0) }}
      prometheus/bridge:
        config:
          scrape_configs:
            {{- toYaml .Values.metricsBridge.prometheus.scrapeConfigs | nindent 12 }}
      {{- end }}

    processors:
      {{- with .Values.collector.config.processors }}
      {{- toYaml . | nindent 6 }}
      {{- end }}

    service:
      extensions:
        {{- with .Values.collector.config.service.extensions }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      pipelines:
        {{- $p := deepCopy .Values.collector.config.service.pipelines }}
        {{- if and $wantDt .Values.metricsBridge.forwardOtelTraces (hasKey $p "traces") }}
        {{- $t := deepCopy (index $p "traces") }}
        {{- $ex := default (list) $t.exporters }}
        {{- if not (has "otlphttp/dynatrace" $ex) }}
        {{- $_ := set $t "exporters" (append $ex "otlphttp/dynatrace") }}
        {{- end }}
        {{- $_ := set $p "traces" $t }}
        {{- end }}
        {{- if and $wantDt .Values.metricsBridge.forwardOtelMetrics (hasKey $p "metrics") }}
        {{- $m := deepCopy (index $p "metrics") }}
        {{- $exm := default (list) $m.exporters }}
        {{- if not (has "otlphttp/dynatrace" $exm) }}
        {{- $_ := set $m "exporters" (append $exm "otlphttp/dynatrace") }}
        {{- end }}
        {{- $_ := set $p "metrics" $m }}
        {{- end }}
        {{- toYaml $p | nindent 8 }}
        {{- if and $wantDt .Values.metricsBridge.enabled (gt (len .Values.metricsBridge.prometheus.scrapeConfigs) 0) }}
        metrics/bridge:
          receivers:
            - prometheus/bridge
          processors:
            - batch
            - memory_limiter
          exporters:
            - otlphttp/dynatrace
        {{- end }}
      telemetry:
        {{- with .Values.collector.config.service.telemetry }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
{{- end }}