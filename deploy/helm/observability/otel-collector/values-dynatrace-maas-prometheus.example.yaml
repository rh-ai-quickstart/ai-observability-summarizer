# Example: OTLP (optional) + Prometheus scrape/federation -> Dynatrace
# Copy to a private file, edit scrape targets and match[], then:
#
#   cd deploy/helm
#   helm upgrade --install otel-collector ./observability/otel-collector \
#     -n observability-hub \
#     --set global.namespace=observability-hub \
#     -f ./observability/otel-collector/values-dynatrace-maas-prometheus.example.yaml
#
# Prerequisites:
# - Secret dynatrace-otel-api (apiToken key) in observability-hub (see METRICS_BRIDGE_DYNATRACE.md).
# - Collector ServiceAccount can authenticate to federation targets (RBAC; see doc section "RBAC for federation").
# - Replace FEDERATE_HOST / ports / namespaces with values from YOUR cluster (`oc get svc -n openshift-user-workload-monitoring`).

metricsBridge:
  enabled: true
  # App OTLP: keep traces to Dynatrace; set metrics false if Dynatrace "partial success" noise bothers you.
  forwardOtelTraces: true
  forwardOtelMetrics: false
  dynatrace:
    otlpHttpEndpoint: "https://kgs37200.live.dynatrace.com/api/v2/otlp"
    apiTokenSecretName: "dynatrace-otel-api"
    apiTokenSecretKey: "apiToken"
  prometheus:
    scrapeConfigs:
      # --- Job 1: User-workload Prometheus federation ---
      # Targets vLLM model-serving metrics plus MaaS / Limitador metrics described in:
      # https://opendatahub-io.github.io/models-as-a-service/latest/advanced-administration/observability/
      # Requires User Workload Monitoring (enableUserWorkload on cluster-monitoring-config).
      #
      # vLLM: names typically match vllm_* (e.g. vllm_num_requests_total, vllm_e2e_request_latency_seconds_*).
      # Limitador (ODH doc): limitador_ratelimit_requests_total, limitador_ratelimit_allowed_total,
      #   limitador_ratelimit_denied_total, limitador_ratelimit_errors_total, limitador_ratelimit_duration_seconds,
      #   limitador_ratelimit_active_connections, limitador_ratelimit_cache_* , limitador_ratelimit_tier_* , etc.
      # Regex limitador_.* covers all of the above.
      #
      # If your Prometheus uses recording-rule style names with a colon (e.g. vllm:foo), add:
      #   - '{__name__=~"vllm:.*"}'
      - job_name: uwm-federate-vllm-limitador
        scrape_interval: 60s
        scrape_timeout: 55s
        honor_labels: true
        metrics_path: /federate
        scheme: https
        tls_config:
          insecure_skip_verify: true
        params:
          match[]:
            - '{__name__=~"vllm_.*"}'
            - '{__name__=~"limitador_.*"}'
        static_configs:
          - targets:
              # User-workload Prometheus (OpenShift monitoring); verify with:
              #   oc get route prometheus-k8s -n openshift-monitoring -o jsonpath='{.spec.host}'   # platform
              #   oc get svc -n openshift-user-workload-monitoring | grep prometheus
              # Prefer full in-cluster DNS if short form fails:
              # prometheus-user-workload.openshift-user-workload-monitoring.svc.cluster.local:9092
              - prometheus-user-workload.openshift-user-workload-monitoring.svc:9092
        # Bearer token for Prometheus (same as kubectl uses in-cluster).
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token

      # --- Job 2 (optional): direct scrape Limitador /metrics (ODH ServiceMonitor pattern) ---
      # Use if Limitador metrics are not in user-workload Prometheus yet, or as a backup.
      # Doc: same observability page — ServiceMonitor selects app: limitador, port name often "metrics".
      #   oc get svc -n kuadrant-system -l app=limitador -o wide
      #   oc get endpoints -n kuadrant-system limitador
      # - job_name: limitador-direct
      #   scrape_interval: 30s
      #   metrics_path: /metrics
      #   static_configs:
      #     - targets: ["limitador.kuadrant-system.svc.cluster.local:8080"]

      # --- "Everything" (NOT recommended): very high cardinality and cost ---
      # Uncomment only in lab, with short retention and Dynatrace agreement:
      # - job_name: uwm-federate-all-names
      #   scrape_interval: 120s
      #   honor_labels: true
      #   metrics_path: /federate
      #   scheme: https
      #   tls_config:
      #     insecure_skip_verify: true
      #   params:
      #     match[]:
      #       - '{__name__=~".+"}'
      #   static_configs:
      #     - targets: ["prometheus-user-workload.openshift-user-workload-monitoring.svc:9092"]
      #   bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
