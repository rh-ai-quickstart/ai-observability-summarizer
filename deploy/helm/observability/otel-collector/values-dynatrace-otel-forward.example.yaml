# Example: send existing OTLP traces and/or metrics (apps → this collector) to Dynatrace
# in addition to Tempo / debug. No Prometheus scrape jobs required.
#
#   helm upgrade --install otel-collector ./observability/otel-collector -n observability-hub \
#     -f values-dynatrace-otel-forward.example.yaml
#
# Create the Secret first (see docs/METRICS_BRIDGE_DYNATRACE.md). Put the API token only in the Secret — not in this file.

metricsBridge:
  enabled: false
  forwardOtelTraces: true
  forwardOtelMetrics: true
  dynatrace:
    otlpHttpEndpoint: "https://kgs37200.live.dynatrace.com/api/v2/otlp"
    apiTokenSecretName: "dynatrace-otel-api"
    apiTokenSecretKey: "apiToken"
  prometheus:
    scrapeConfigs: []
