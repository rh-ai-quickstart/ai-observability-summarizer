{{- if .Values.rbac.create }}
{{- if .Values.rbac.collector.create }}
{{/*
Collector Service Account and RBAC for OpenShift Logging.
This creates the necessary service account and permissions for log collection.
Uses lookup to skip resources that already exist (e.g., created by Logging Operator).

NOTE: Set rbac.collector.create=false if using OLM-managed Logging Operator,
as it will create these resources automatically.
*/}}

{{/* ServiceAccount */}}
{{- if not (lookup "v1" "ServiceAccount" "openshift-logging" "collector") }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: collector
  namespace: openshift-logging
  labels:
    {{- include "loki-stack.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
{{- end }}

{{/* ClusterRole: collect-application-logs */}}
{{- if not (lookup "rbac.authorization.k8s.io/v1" "ClusterRole" "" "collect-application-logs") }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: collect-application-logs
  labels:
    {{- include "loki-stack.labels" . | nindent 4 }}
rules:
- apiGroups:
  - logging.openshift.io
  - observability.openshift.io
  resourceNames:
  - application
  resources:
  - logs
  verbs:
  - collect
{{- end }}

{{/* ClusterRole: collect-infrastructure-logs */}}
{{- if not (lookup "rbac.authorization.k8s.io/v1" "ClusterRole" "" "collect-infrastructure-logs") }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: collect-infrastructure-logs
  labels:
    {{- include "loki-stack.labels" . | nindent 4 }}
rules:
- apiGroups:
  - logging.openshift.io
  - observability.openshift.io
  resourceNames:
  - infrastructure
  resources:
  - logs
  verbs:
  - collect
{{- end }}

{{/* ClusterRole: collect-audit-logs */}}
{{- if not (lookup "rbac.authorization.k8s.io/v1" "ClusterRole" "" "collect-audit-logs") }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: collect-audit-logs
  labels:
    {{- include "loki-stack.labels" . | nindent 4 }}
rules:
- apiGroups:
  - logging.openshift.io
  - observability.openshift.io
  resourceNames:
  - audit
  resources:
  - logs
  verbs:
  - collect
{{- end }}

{{/* ClusterRole: logging-collector-logs-writer */}}
{{- if not (lookup "rbac.authorization.k8s.io/v1" "ClusterRole" "" "logging-collector-logs-writer") }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: logging-collector-logs-writer
  labels:
    {{- include "loki-stack.labels" . | nindent 4 }}
rules:
- apiGroups: ["loki.grafana.com"]
  resources: ["application", "infrastructure", "audit"]
  verbs: ["create"]
{{- end }}

{{/* ClusterRoleBinding: collect-application-logs */}}
{{- if not (lookup "rbac.authorization.k8s.io/v1" "ClusterRoleBinding" "" "collect-application-logs") }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: collect-application-logs
  labels:
    {{- include "loki-stack.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: collect-application-logs
subjects:
- kind: ServiceAccount
  name: collector
  namespace: openshift-logging
{{- end }}

{{/* ClusterRoleBinding: collect-infrastructure-logs */}}
{{- if not (lookup "rbac.authorization.k8s.io/v1" "ClusterRoleBinding" "" "collect-infrastructure-logs") }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: collect-infrastructure-logs
  labels:
    {{- include "loki-stack.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: collect-infrastructure-logs
subjects:
- kind: ServiceAccount
  name: collector
  namespace: openshift-logging
{{- end }}

{{/* ClusterRoleBinding: collect-audit-logs */}}
{{- if not (lookup "rbac.authorization.k8s.io/v1" "ClusterRoleBinding" "" "collect-audit-logs") }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: collect-audit-logs
  labels:
    {{- include "loki-stack.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: collect-audit-logs
subjects:
- kind: ServiceAccount
  name: collector
  namespace: openshift-logging
{{- end }}

{{/* ClusterRoleBinding: logging-collector-logs-writer */}}
{{- if not (lookup "rbac.authorization.k8s.io/v1" "ClusterRoleBinding" "" "logging-collector-logs-writer") }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: logging-collector-logs-writer
  labels:
    {{- include "loki-stack.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: logging-collector-logs-writer
subjects:
- kind: ServiceAccount
  name: collector
  namespace: openshift-logging
{{- end }}

{{- end }}{{/* end rbac.collector.create */}}
{{- end }}{{/* end rbac.create */}}
