  name: tempo-product
  source: redhat-operators
  sourceNamespace: openshift-marketplace
  # Match scripts/operators/tempo.yaml pin (see comments there)
  startingCSV: tempo-operator.v0.16.0-2
  installPlanApproval: Manual

