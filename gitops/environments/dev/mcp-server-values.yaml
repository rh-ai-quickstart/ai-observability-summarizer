image:
  tag: 1.0.8-feature

# GitOps note:
# - The Makefile conditionally creates ClusterRole grafana-prometheus-reader.
# - In Argo CD, avoid "if exists" logic by setting this explicitly.
rbac:
  createGrafanaRole: false
  bindOpenshiftClusterMonitoringView: false

# Match Makefile usage: `--set LLM_PREDICTOR=$(LLM)-predictor`
# Set this to your actual predictor name, or keep the chart default.
LLM_PREDICTOR: "llama-3-1-8b-instruct-predictor"

env:
  # Uses OpenShift-managed Thanos (cluster monitoring)
  PROMETHEUS_URL: "https://thanos-querier.openshift-monitoring.svc.cluster.local:9091"

  # Uses your observability-hub TempoStack
  TEMPO_URL: "https://tempo-tempostack-gateway.observability-hub.svc.cluster.local:8080"
  TEMPO_TENANT_ID: "dev"

  # Uses Korrel8r (typically in openshift-cluster-observability-operator namespace)
  KORREL8R_URL: "https://korrel8r-summarizer.openshift-cluster-observability-operator.svc.cluster.local:9443"

