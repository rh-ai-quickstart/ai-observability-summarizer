apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aiobs-root
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_ORG/ai-observability-summarizer.git
    targetRevision: main
    # This path contains the child Application YAMLs (app-of-apps pattern)
    path: gitops/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

