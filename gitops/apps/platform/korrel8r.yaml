apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aiobs-platform-korrel8r
  namespace: openshift-gitops
  annotations:
    argocd.argoproj.io/sync-wave: "30"
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_ORG/ai-observability-summarizer.git
    targetRevision: main
    path: deploy/helm/observability/korrel8r
    helm:
      releaseName: korrel8r-summarizer
      valueFiles:
        - ../../../../gitops/environments/dev/korrel8r-values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-cluster-observability-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

