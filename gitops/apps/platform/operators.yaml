apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aiobs-platform-operators
  namespace: openshift-gitops
  annotations:
    # Matches `make install-operators` prerequisite.
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_ORG/ai-observability-summarizer.git
    targetRevision: main
    path: gitops/manifests/operators
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-gitops
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

