apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: aiobs-app-tracing-setup
  namespace: openshift-gitops
  annotations:
    # Makefile runs setup-tracing as part of install-observability-stack.
    argocd.argoproj.io/sync-wave: "25"
spec:
  project: default
  source:
    repoURL: https://github.com/YOUR_ORG/ai-observability-summarizer.git
    targetRevision: main
    path: gitops/manifests/tracing
  destination:
    server: https://kubernetes.default.svc
    namespace: openshift-ai-observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

